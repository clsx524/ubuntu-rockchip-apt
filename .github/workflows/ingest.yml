name: Ingest package

on:
  workflow_dispatch:
    inputs:
      deb_url:
        description: 'Direct URL of .deb file to ingest'
        required: true
      suite:
        description: 'Suite (e.g. questing)'
        required: true
        default: 'questing'

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Download .deb
        run: curl -fsSL "${{ inputs.deb_url }}" -o /tmp/pkg.deb

      - name: Place .deb into pool and dists
        run: |
          PKGNAME=$(dpkg-deb --field /tmp/pkg.deb Package)
          ARCH=$(dpkg-deb --field /tmp/pkg.deb Architecture)
          VERSION=$(dpkg-deb --field /tmp/pkg.deb Version)
          SUITE="${{ inputs.suite }}"
          FILENAME="${PKGNAME}_${VERSION}_${ARCH}.deb"

          # Pool path (for organisation)
          POOL="pool/${SUITE}/main/${PKGNAME:0:1}/${PKGNAME}"
          mkdir -p "${POOL}"
          cp /tmp/pkg.deb "${POOL}/${FILENAME}"

          # Dists path (for apt-ftparchive to scan)
          DISTS="dists/${SUITE}/main/binary-${ARCH}"
          mkdir -p "${DISTS}"
          cp /tmp/pkg.deb "${DISTS}/${FILENAME}"

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "ingest: $(dpkg-deb --field /tmp/pkg.deb Package) into ${{ inputs.suite }}"
          git push

      - name: Trigger publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish.yml --repo ${{ github.repository }}
